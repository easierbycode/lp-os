<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#070a12">
    <title>Inventory Manager — LifePreneur</title>
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/kiosk.css">
  </head>
  <body>
    <!-- Sticky top nav, ported from the bundle's Layout component: logo +
         "Inventory Manager" + the three section links. Links are plain
         /kiosk/* hrefs; kiosk.js intercepts them for client-side routing. -->
    <nav class="kiosk-nav">
      <div class="nav-inner">
        <a class="nav-brand" href="/kiosk/samples">
          <img
            class="nav-logo"
            src="https://assets.codepen.io/11817390/LifePreneur-logo.svg"
            alt="LifePreneur"
          >
          <span class="nav-title">Inventory Manager</span>
        </a>
        <div class="nav-links">
          <a class="btn btn-ghost" href="/kiosk/samples" data-nav="samples">
            <svg
              class="ic"
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path
                d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"
              />
              <path d="m3.3 7 8.7 5 8.7-5" />
              <path d="M12 22V12" />
            </svg>
            Samples
          </a>
          <a class="btn btn-ghost" href="/kiosk/bundles" data-nav="bundles">
            <svg
              class="ic"
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="m7.5 4.27 9 5.15" />
              <path
                d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"
              />
              <path d="m3.3 7 8.7 5 8.7-5" />
              <path d="M12 22V12" />
            </svg>
            Bundles
          </a>
          <a class="btn btn-ghost" href="/kiosk/checkout" data-nav="checkout">
            <svg
              class="ic"
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <rect width="5" height="5" x="3" y="3" rx="1" />
              <rect width="5" height="5" x="16" y="3" rx="1" />
              <rect width="5" height="5" x="3" y="16" rx="1" />
              <path d="M21 16h-3a2 2 0 0 0-2 2v3" />
              <path d="M21 21v.01" />
              <path d="M12 7v3a2 2 0 0 1-2 2H7" />
              <path d="M3 12h.01" />
              <path d="M12 3h.01" />
              <path d="M12 16v.01" />
              <path d="M16 12h1" />
              <path d="M21 12v.01" />
              <path d="M12 21v-1" />
            </svg>
            Checkout
          </a>
        </div>
      </div>
    </nav>

    <main id="root">
      <!-- Replaced by kiosk.js on first render (parity with the old SPA
           shell's boot spinner). -->
      <div class="center-screen">
        <div class="empty-state">
          <div class="boot-spinner" aria-hidden="true"></div>
          <p class="muted">Loading Inventory Manager...</p>
        </div>
      </div>
    </main>

    <script type="module" src="/kiosk.js"></script>
  </body>
</html>
