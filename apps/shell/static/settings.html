<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Settings · LP-OS</title>
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com"
      crossorigin="crossorigin" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Figtree:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/settings.css" />
  </head>
  <body>
    <!-- SVG gradient defs reused by the folder tiles in the Team live preview
         (document-scoped url() references, injected once). -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <linearGradient id="g-folder-back" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#c75408" />
          <stop offset="1" stop-color="#9c4106" />
        </linearGradient>
        <linearGradient id="g-folder-front" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#f6a93f" />
          <stop offset="1" stop-color="#e8650a" />
        </linearGradient>
      </defs>
    </svg>
    <div id="settings-root" class="settings"
      aria-label="Settings"></div>
    <script src="/settings.js"></script>
  </body>
</html>
